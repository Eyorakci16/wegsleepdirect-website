name: HTML Validator

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  html-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: HTML5 Validator
        id: html5
        uses: Cyb3r-Jak3/html5validator-action@v0.1.0
        with:
          root: WegSleepDirect_Website

      - name: Show validation status
        run: echo "Pages valid? ${{ steps.html5.outputs.valid }}"
